version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: flowers-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-flowers123}
      MYSQL_DATABASE: flowers
      MYSQL_USER: flowers
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-flowers123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./backend
    container_name: flowers-backend
    restart: always
    environment:
      DATABASE_URL: mysql+aiomysql://flowers:${MYSQL_PASSWORD:-flowers123}@mysql:3306/flowers
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-flowers666}
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: flowers-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
